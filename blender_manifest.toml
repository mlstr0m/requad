schema_version = "1.0.0"

id = "requad"
version = "0.8.0"
name = "ReQuad"
tagline = "Free auto-retopology powered by QuadWild bi-MDF"
maintainer = "Aurélien <aurl.desert@gmail.com>"
type = "add-on"
website = "https://github.com/mlstr0m/requad"
tags = ["Mesh"]

blender_version_min = "4.2.0"

license = ["SPDX:GPL-3.0-or-later"]
copyright = [
  "2026 Aurélien and the ReQuad contributors",
  "2021 Nico Pietroni et al. (QuadWild)",
  "2023 Martin Heistermann, Jethro Warnett, David Bommes (bi-MDF / satsuma)",
]

# Bundled engine binaries — one build per platform, produced by CI.
platforms = ["macos-arm64", "linux-x64", "windows-x64"]

[build]
paths_exclude_pattern = [
  "__pycache__/",
  "/.git/",
  "/.github/",
  "/tests/",
  "/patches/",
  "/docs/",
  "*.zip",
]
