# Build the QuadWild bi-MDF engine binaries for every supported platform,
# then package the Blender extension (one zip per platform).
#
# Engine source is pinned to a known-good commit and patched with patches/.

name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  ENGINE_REPO: https://github.com/cgg-bern/quadwild-bimdf
  ENGINE_COMMIT: cbda68e5deddf9d0e24c24382852f37a6eb2a630
  BLENDER_VERSION: "4.2.0"

jobs:
  engine:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,     tag: macos-arm64,
              flags: "-Wno-missing-template-arg-list-after-template-kw",
              cflags: "" }
          # macos-x64 dropped: Blender 5.0+ is Apple Silicon only (4.5 LTS
          # was the last Intel build) and the macos-13 runners bottleneck
          # every run. Re-add on demand for Blender <=4.5 LTS users.
          - { os: ubuntu-22.04, tag: linux-x64, flags: "", cflags: "" }
          # the bundled academic libs key their Windows paths on the WIN32
          # macro, which MSVC does not define by itself
          - { os: windows-2022, tag: windows-x64,
              flags: "-DWIN32", cflags: "-DWIN32" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch engine source
        shell: bash
        run: |
          git clone --recursive "$ENGINE_REPO" engine-src
          cd engine-src
          git checkout "$ENGINE_COMMIT"
          git submodule update --recursive
          for p in ../patches/*.patch; do git apply "$p"; done

      - name: Build
        shell: bash
        run: |
          cd engine-src
          cmake . -B build -DSATSUMA_ENABLE_BLOSSOM5=0 -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
                -DCMAKE_CXX_FLAGS="${{ matrix.flags }}" \
                -DCMAKE_C_FLAGS="${{ matrix.cflags }}"
          # --config is required for MSVC's multi-config generator (without
          # it MSBuild silently builds Debug); no-op for single-config
          cmake --build build -j4 --config Release

      - name: Collect binaries
        shell: bash
        run: |
          mkdir -p out/${{ matrix.tag }}
          # MSVC's multi-config generator nests binaries under Release/
          for base in engine-src/build/Build/bin engine-src/build/Build/bin/Release; do
            if ls "$base"/quadwild* >/dev/null 2>&1; then
              cp "$base"/quadwild* "$base"/quad_from_patches* out/${{ matrix.tag }}/
              break
            fi
          done
          # an empty ls exits 0 on a directory — check the binaries exist,
          # otherwise the job goes green while shipping nothing
          if ! ls out/${{ matrix.tag }}/quadwild* >/dev/null 2>&1; then
            echo "::error::no engine binaries found for ${{ matrix.tag }}"
            find engine-src/build -name "quadwild*" -o -name "quad_from_patches*" | head
            exit 1
          fi
          ls out/${{ matrix.tag }}/

      - uses: actions/upload-artifact@v4
        with:
          name: engine-${{ matrix.tag }}
          path: out/

  extension:
    needs: engine
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble engine folder
        run: |
          for d in artifacts/engine-*/*/; do
            tag=$(basename "$d")
            mkdir -p "engine/$tag"
            cp "$d"* "engine/$tag/"
            chmod +x "engine/$tag/"* || true
          done
          # every platform in the manifest must actually ship an engine —
          # a missing artifact must fail here, not on a user's machine
          for tag in macos-arm64 linux-x64 windows-x64; do
            if ! ls "engine/$tag"/quadwild* >/dev/null 2>&1; then
              echo "::error::missing engine binaries for $tag"
              exit 1
            fi
          done
          ls -R engine

      - name: Install Blender
        run: |
          # install OUTSIDE the source dir: anything left inside would be
          # swallowed into the extension zips (v1 CI shipped 796MB zips...)
          cd "$RUNNER_TEMP"
          curl -fsSL "https://download.blender.org/release/Blender${BLENDER_VERSION%.*}/blender-${BLENDER_VERSION}-linux-x64.tar.xz" -o blender.tar.xz
          tar xf blender.tar.xz
          echo "$RUNNER_TEMP/blender-${BLENDER_VERSION}-linux-x64" >> "$GITHUB_PATH"

      - name: Build extension (one zip per platform)
        run: |
          # platforms in the manifest must match the engine folders we ship;
          # the extension builder does not create the output directory itself
          mkdir -p dist
          blender --command extension build --split-platforms \
                  --source-dir . --output-dir dist
          ls -lh dist/

      - name: Validate extension zips
        run: |
          for z in dist/*.zip; do
            blender --command extension validate "$z"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: requad-extension
          path: dist/*.zip

  # Quality gate: the full test battery runs against the freshly built
  # linux zip on every push. A red gate means the zips must not ship.
  test:
    needs: extension
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: requad-extension
          path: dist

      - name: Install Blender
        run: |
          cd "$RUNNER_TEMP"
          curl -fsSL "https://download.blender.org/release/Blender${BLENDER_VERSION%.*}/blender-${BLENDER_VERSION}-linux-x64.tar.xz" -o blender.tar.xz
          tar xf blender.tar.xz
          echo "$RUNNER_TEMP/blender-${BLENDER_VERSION}-linux-x64" >> "$GITHUB_PATH"

      - name: Run test suites against the built zip
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq \
            libxi6 libxxf86vm1 libxfixes3 libxrender1 libgl1 libegl1
          ZIP=$(ls dist/requad-*-linux_x64.zip)
          fail=0
          for t in tests/test_headless.py tests/test_robustness.py tests/test_beta.py; do
            echo "== $t"
            REQUAD_ZIP="$PWD/$ZIP" blender -b --python "$t" | tee /tmp/out.log
            grep -q "^0 failure(s)" /tmp/out.log || fail=1
          done
          exit $fail
